<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxFlow Pro — Business Tax Return 2025</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:#0077C8; --blue-dark:#005A9E; --blue-light:#E8F4FF;
      --green:#00A86B; --green-h:#008558; --red:#D93025;
      --yellow-bg:#FFFBEA; --yellow-bd:#F6C90E;
      --text:#1A1A2E; --muted:#6B7280; --border:#D1D5DB;
      --bg:#F3F6FB; --card:#FFFFFF; --accent:#06D6A0;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* HEADER */
    header { background:var(--blue); color:#fff; position:sticky; top:0; z-index:200; box-shadow:0 2px 10px rgba(0,0,0,.2); }
    .hdr-top { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; }
    .logo { font-size:22px; font-weight:800; letter-spacing:-.4px; }
    .logo span { color:var(--accent); }
    .live-est { text-align:right; }
    .live-est .lbl { font-size:11px; opacity:.75; text-transform:uppercase; letter-spacing:.5px; }
    .live-est .amt { font-size:22px; font-weight:700; line-height:1.1; }
    .prog-wrap { padding:0 28px 12px; }
    .prog-meta { display:flex; justify-content:space-between; font-size:11px; opacity:.8; margin-bottom:5px; }
    .prog-track { height:7px; background:rgba(255,255,255,.25); border-radius:4px; overflow:hidden; }
    .prog-fill { height:100%; background:var(--accent); border-radius:4px; transition:width .4s ease; }

    /* LAYOUT */
    main { max-width:1080px; margin:36px auto; padding:0 20px; display:grid; grid-template-columns:1fr 300px; gap:24px; }
    @media (max-width:780px) { main { grid-template-columns:1fr; } .sidebar { order:-1; } }

    /* CARD */
    .card { background:var(--card); border-radius:16px; padding:40px 44px; box-shadow:0 4px 24px rgba(0,0,0,.07); }
    .step-chip { display:inline-block; background:var(--blue-light); color:var(--blue); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; padding:4px 10px; border-radius:20px; margin-bottom:10px; }
    .card h1 { font-size:26px; font-weight:800; line-height:1.2; margin-bottom:8px; }
    .card .sub { font-size:15px; color:var(--muted); margin-bottom:28px; line-height:1.55; }

    /* SIDEBAR */
    .sidebar { position:sticky; top:90px; height:fit-content; }
    .sb-card { background:var(--card); border-radius:16px; padding:22px; box-shadow:0 4px 24px rgba(0,0,0,.07); }
    .sb-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:14px; }
    .sb-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
    .sb-row:last-of-type { border-bottom:none; }
    .sb-row .v { font-weight:600; }
    .sb-row .v.neg { color:var(--green); }
    .sb-row .v.pos { color:var(--red); }
    .sb-div { border:none; border-top:1px dashed var(--border); margin:8px 0; }
    .sb-total { display:flex; justify-content:space-between; align-items:center; padding:14px 0 4px; font-weight:800; font-size:16px; color:var(--blue); }
    .sb-note { font-size:10.5px; color:var(--muted); line-height:1.4; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }

    /* UI FORMS */
    .fg { margin-bottom:22px; }
    .fl { display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600; margin-bottom:8px; }
    .fl .hint { font-weight:400; color:var(--muted); font-size:12.5px; }
    input[type=text],input[type=number],select { width:100%; padding:13px 15px; border:2px solid var(--border); border-radius:10px; font-size:15px; color:var(--text); background:#fff; transition:border-color .2s,box-shadow .2s; }
    input[type=text]:focus,input[type=number]:focus,select:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,119,200,.12); }
    .dw { position:relative; }
    .dw::before { content:'$'; position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:15px; }
    .dw input { padding-left:26px; }
    .fg2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:560px) { .fg2 { grid-template-columns:1fr; } }

    /* RADIO CARDS */
    .rg { display:grid; gap:11px; }
    .rc { border:2px solid var(--border); border-radius:12px; padding:15px 18px; cursor:pointer; display:flex; align-items:flex-start; gap:13px; transition:border-color .18s,background .18s; }
    .rc:hover { border-color:#93C5FD; background:#F8FBFF; }
    .rc.sel { border-color:var(--blue); background:var(--blue-light); }
    .rc input[type=radio] { accent-color:var(--blue); width:17px; height:17px; flex-shrink:0; margin-top:3px; }
    .rc-body .t { font-weight:700; font-size:14.5px; margin-bottom:2px; }
    .rc-body .d { font-size:12.5px; color:var(--muted); line-height:1.4; }

    /* BUTTONS */
    .btn-row { display:flex; gap:12px; margin-top:20px; }
    .btn-back { flex:0 0 auto; padding:14px 28px; border:2px solid var(--border); border-radius:10px; background:transparent; color:var(--blue); font-size:15px; font-weight:600; cursor:pointer; transition:.18s; }
    .btn-back:hover { border-color:var(--blue); background:var(--blue-light); }
    .btn-cont { flex:1; padding:16px 24px; border:none; border-radius:10px; background:var(--green); color:#fff; font-size:16px; font-weight:800; cursor:pointer; transition:.18s; }
    .btn-cont:hover { background:var(--green-h); transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,168,107,.3); }

    /* MISC */
    .alert { border-radius:10px; padding:14px 16px; font-size:13.5px; line-height:1.55; margin-bottom:20px; }
    .alert.info { background:#EFF6FF; border:1px solid #BFDBFE; }
    .alert.warn { background:var(--yellow-bg); border:1px solid var(--yellow-bd); }
    hr.sd { border:none; border-top:1px solid var(--border); margin:22px 0; }
    .sh { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:14px; }
    .rb { background:#F9FAFB; border-radius:10px; padding:16px; font-size:14px; margin-bottom:22px; }
    .rl { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #EDEFF2; }
    .rl:last-child { border-bottom:none; }
    .rl.bold { font-weight:700; font-size:15px; }

    /* WELCOME */
    .wi { width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,var(--blue),#38BDF8); display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:22px; }
    .fl-list { list-style:none; margin:20px 0 28px; }
    .fl-list li { display:flex; align-items:center; gap:12px; padding:10px 0; font-size:15px; border-bottom:1px solid var(--border); }
    .fl-list li:last-child { border-bottom:none; }
    .chk { color:var(--green); font-size:17px; }

    /* ACTION BAR */
    .abar { display:flex; gap:12px; margin-bottom:20px; }
    .btn-print { flex:1; padding:14px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; transition:.18s; }
    .btn-print:hover { background:var(--blue-dark); }
    .btn-dl { flex:1; padding:14px; background:#fff; color:var(--blue); border:2px solid var(--blue); border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; transition:.18s; }
    .btn-dl:hover { background:var(--blue-light); }

    /* TABS */
    .tab-bar { display:flex; gap:4px; margin-bottom:0; border-bottom:2px solid var(--blue); }
    .tab-btn { padding:10px 22px; border:2px solid transparent; border-bottom:none; background:#f0f4f8; color:var(--muted); font-size:14px; font-weight:600; cursor:pointer; border-radius:8px 8px 0 0; transition:.18s; }
    .tab-btn.on { background:white; color:var(--blue); border-color:var(--blue); margin-bottom:-2px; }
    .tab-btn:hover:not(.on) { background:#e0eaf5; color:var(--blue); }
    .tab-content { border:2px solid var(--blue); border-top:none; border-radius:0 0 10px 10px; padding:20px; background:white; overflow-x:auto; }

    /* ══════════════════════════════════════════════
       OFFICIAL FORM STYLES
    ══════════════════════════════════════════════ */
    .fp { background:white; font-family:Arial,Helvetica,sans-serif; color:#000; border:1.5px solid #000; margin-bottom:8px; font-size:8.5px; }

    /* IRS Form Header */
    .fp-hdr { display:grid; grid-template-columns:1fr 115px; border-bottom:2px solid #000; }
    .fp-hdr-l { background:#dde8f5; padding:7px 10px; }
    .fp-hdr-dept { font-size:7px; text-transform:uppercase; letter-spacing:.3px; color:#333; }
    .fp-hdr-title { font-size:13px; font-weight:900; margin:3px 0 1px; }
    .fp-hdr-sub { font-size:7.5px; color:#333; line-height:1.3; margin-top:3px; }
    .fp-hdr-r { background:#dde8f5; border-left:1.5px solid #000; padding:6px 8px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .fp-num-sm { font-size:8px; font-weight:700; line-height:1.1; }
    .fp-num-big { font-size:26px; font-weight:900; line-height:1; letter-spacing:-1px; }
    .fp-omb { font-size:6.5px; color:#555; margin-top:5px; }
    .fp-yr { font-size:12px; font-weight:900; margin-top:1px; }

    /* Virginia Header */
    .fp-va-hdr { background:#003087; color:white; padding:8px 12px; display:grid; grid-template-columns:1fr 100px; align-items:center; }
    .fp-va-hdr-l .vtitle { font-size:14px; font-weight:900; }
    .fp-va-hdr-l .vsub { font-size:8px; margin-top:2px; opacity:.85; }
    .fp-va-hdr-r { text-align:center; border-left:1px solid rgba(255,255,255,.35); padding-left:10px; }
    .fp-va-num { font-size:20px; font-weight:900; }
    .fp-va-yr { font-size:10px; margin-top:1px; }

    /* Info fields */
    .fp-fields { border-bottom:1px solid #000; }
    .fp-row-fields { display:grid; }
    .fp-fld { border-right:1px solid #000; border-bottom:1px solid #000; padding:2px 6px; min-height:22px; }
    .fp-fld:last-child { border-right:none; }
    .fp-fld-lbl { font-size:6.5px; color:#444; margin-bottom:1px; }
    .fp-fld-val { font-size:8.5px; }

    /* Part / section headers */
    .fp-part { background:#1e3a5f; color:white; padding:3px 8px; font-size:7.5px; font-weight:bold; letter-spacing:.2px; }
    .fp-sect { background:#4a6f9b; color:white; padding:2px 8px; font-size:7px; font-weight:bold; }
    .fp-note-row { padding:2px 8px; font-size:7.5px; background:#f5f8fc; border-bottom:.5px solid #ccc; }

    /* Data rows */
    .fp-r { display:grid; grid-template-columns:26px 1fr 135px; min-height:17px; border-bottom:.5px solid #bbb; align-items:stretch; }
    .fp-r.bold .fp-a { font-weight:bold; background:#eef2f7; }
    .fp-r.total .fp-a { font-weight:bold; background:#fef9e7; border-top:1.5px solid #000; }
    .fp-ln { background:#f4f6fa; border-right:1px solid #999; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:bold; }
    .fp-d { padding:2px 8px; font-size:8px; display:flex; align-items:center; }
    .fp-a { border-left:1px solid #999; padding-right:8px; font-family:'Courier New',monospace; font-size:8px; display:flex; align-items:center; justify-content:flex-end; }

    /* Compact rows (2-col expense section) */
    .fp-rs { display:grid; grid-template-columns:22px 1fr 86px; min-height:14px; border-bottom:.5px solid #ccc; align-items:stretch; }
    .fp-rs .fp-ln { font-size:6.5px; }
    .fp-rs .fp-d { font-size:7.5px; }
    .fp-rs .fp-a { font-size:7.5px; border-left-color:#ccc; }

    /* Two-column expense layout */
    .fp-2col { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid #999; }
    .fp-2col > div:first-child { border-right:1.5px solid #000; }

    /* Signature */
    .fp-sig { border-top:2px solid #000; padding:8px 10px; font-size:7.5px; }
    .fp-sig-decl { font-size:7px; line-height:1.5; margin-bottom:8px; color:#333; }
    .fp-sig-grid { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-top:4px; }
    .fp-sig-grid-3 { display:grid; grid-template-columns:2fr 1fr 1fr; gap:14px; margin-top:4px; }
    .fp-sig-line { border-bottom:1px solid #000; min-height:20px; margin-bottom:2px; }
    .fp-sig-lbl { font-size:6.5px; color:#555; }
    .fp-foot { display:flex; justify-content:space-between; font-size:6.5px; color:#555; padding:3px 8px; border-top:1px solid #ccc; }

    /* PRINT */
    @media print {
      header, .sidebar, .abar, .btn-row, .step-chip, .card > h1, .card > .sub, .tab-bar { display:none !important; }
      main { display:block !important; max-width:100%; margin:0; padding:0; }
      .card { box-shadow:none; border-radius:0; padding:4px; }
      body { background:white; }
      .tab-content { display:block !important; border:none; padding:0; }
      .fp { page-break-after:always; margin:0; font-size:8pt; }
      .fp:last-child { page-break-after:avoid; }
      @page { margin:.5in; size:letter; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="logo">Tax<span>Flow</span> Pro</div>
    <div class="live-est">
      <div class="lbl">Estimated Tax Liability</div>
      <div class="amt" id="hdrAmt">$0</div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span id="progLbl">Getting Started</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <div id="mc"></div>
  <div class="sidebar">
    <div class="sb-card">
      <div class="sb-title">Live Tax Estimate</div>
      <div class="sb-row"><span>Gross Revenue</span>  <span class="v" id="sbRev">$0</span></div>
      <div class="sb-row"><span>Cost of Goods</span>  <span class="v neg" id="sbCOGS">($0)</span></div>
      <div class="sb-row"><span>Expenses</span>       <span class="v neg" id="sbExp">($0)</span></div>
      <div class="sb-row"><span>Net Profit</span>     <span class="v" id="sbProfit">$0</span></div>
      <hr class="sb-div">
      <div class="sb-row"><span>SE Tax</span>         <span class="v pos" id="sbSE">$0</span></div>
      <div class="sb-row"><span>Federal Income</span> <span class="v pos" id="sbFed">$0</span></div>
      <div class="sb-row"><span>State Income</span>   <span class="v pos" id="sbSt">$0</span></div>
      <hr class="sb-div">
      <div class="sb-total"><span>Total Owed</span><span id="sbTot">$0</span></div>
      <p class="sb-note">Estimates update live as you type. For planning only — consult a CPA before filing.</p>
    </div>
  </div>
</main>

<script>
/* ─── STATE ─── */
const S = {
  entityType:'sole_prop', businessName:'', ein:'', businessAddress:'',
  businessCity:'', businessState:'VA', businessZip:'', taxYear:'2025',
  ownerName:'', ownerSSN:'', filingStatus:'single',
  grossSales:0, returnsAllowances:0, otherIncome:0,
  beginningInventory:0, purchases:0, endingInventory:0,
  advertising:0, carExpenses:0, depreciation:0, employeeBenefits:0,
  insurance:0, legalProfessional:0, officeExpense:0, rentEquipment:0,
  rentSpace:0, repairsMaintenance:0, supplies:0, taxesLicenses:0,
  travel:0, meals:0, utilities:0, wages:0, otherExpenses:0,
  section179:0, qbi:true,
};
const SCREENS = ['welcome','entity','bizinfo','personal','revenue','cogs','expenses','deductions','review','taxreturn'];
const SLABELS = ['Getting Started','Entity Type','Business Info','Personal Info','Revenue','Cost of Goods','Expenses','Deductions','Review','Tax Return'];
let cur = 0;

/* ─── FEDERAL TAX BRACKETS 2025 ─── */
const BR = {
  single:[[0,11925,.10],[11925,48475,.12],[48475,103350,.22],[103350,197300,.24],[197300,250525,.32],[250525,626350,.35],[626350,1e12,.37]],
  mfj:   [[0,23850,.10],[23850,96950,.12],[96950,206700,.22],[206700,394600,.24],[394600,501050,.32],[501050,751600,.35],[751600,1e12,.37]],
  mfs:   [[0,11925,.10],[11925,48475,.12],[48475,103350,.22],[103350,197300,.24],[197300,250525,.32],[250525,313200,.35],[313200,1e12,.37]],
  hoh:   [[0,17000,.10],[17000,64850,.12],[64850,103350,.22],[103350,197300,.24],[197300,250500,.32],[250500,626350,.35],[626350,1e12,.37]],
};
const STD = {single:15000,mfj:30000,mfs:15000,hoh:22500};
const SR = {AL:.05,AK:0,AZ:.025,AR:.044,CA:.093,CO:.044,CT:.065,DE:.066,FL:0,GA:.055,HI:.11,ID:.058,IL:.0495,IN:.03,IA:.056,KS:.057,KY:.045,LA:.03,ME:.075,MD:.0575,MA:.05,MI:.0425,MN:.0985,MS:.05,MO:.048,MT:.069,NE:.0664,NV:0,NH:0,NJ:.1075,NM:.049,NY:.109,NC:.0475,ND:.025,OH:.035,OK:.0475,OR:.099,PA:.0307,RI:.0599,SC:.07,SD:0,TN:0,TX:0,UT:.0495,VT:.0875,VA:.0575,WA:0,WV:.065,WI:.0765,WY:0,DC:.0895};

/* ─── VIRGINIA TAX 2025 ─── */
function calcVATax(income, status) {
  const vaBr = [[0,3000,.02],[3000,5000,.03],[5000,17000,.05],[17000,1e12,.0575]];
  const vaSD = {single:9000,mfj:18000,mfs:9000,hoh:9000};
  const vaEx = {single:930,mfj:1860,mfs:930,hoh:930};
  const stdDed = vaSD[status]||9000, exemption = vaEx[status]||930;
  const taxable = Math.max(0, income - stdDed - exemption);
  let tax = 0;
  for (const [lo,hi,r] of vaBr) { if (taxable<=lo) break; tax+=(Math.min(taxable,hi)-lo)*r; }
  return {taxable, tax, stdDed, exemption};
}

function brTax(inc, br) {
  let t=0;
  for (const [lo,hi,r] of br) { if(inc<=lo) break; t+=(Math.min(inc,hi)-lo)*r; }
  return t;
}

/* ─── MAIN CALC ─── */
function calc() {
  const gross = Math.max(0,(S.grossSales||0)-(S.returnsAllowances||0)+(S.otherIncome||0));
  const cogs  = Math.max(0,(S.beginningInventory||0)+(S.purchases||0)-(S.endingInventory||0));
  const exp   = [S.advertising,S.carExpenses,S.depreciation,S.employeeBenefits,S.insurance,S.legalProfessional,S.officeExpense,S.rentEquipment,S.rentSpace,S.repairsMaintenance,S.supplies,S.taxesLicenses,S.travel,(S.meals||0)*.5,S.utilities,S.wages,S.otherExpenses,S.section179].reduce((a,v)=>a+(v||0),0);
  const net   = gross - cogs - exp;
  let seTax=0, fedTax=0, stateTax=0, deductSE=0, qbiDed=0;
  const br=BR[S.filingStatus]||BR.single, std=STD[S.filingStatus]||15000;
  const sr=SR[S.businessState]??0.05;

  if (S.entityType==='ccorp') {
    if (net>0) {
      fedTax = net*.21;
      stateTax = S.businessState==='VA' ? Math.max(250, net*.06) : net*sr*.85;
    }
  } else if (net>0) {
    if (S.entityType==='sole_prop'||S.entityType==='llc') {
      const senet=net*.9235, cap=176100;
      seTax = senet<=cap ? senet*.153 : cap*.124+senet*.029+(senet>200000?(senet-200000)*.009:0);
      deductSE=seTax/2;
    }
    if (S.qbi) qbiDed=net*.20;
    const taxable=Math.max(0,net-deductSE-qbiDed-std);
    fedTax=brTax(taxable,br);
    const vaIncome=Math.max(0,net-deductSE-qbiDed);
    stateTax = S.businessState==='VA' ? calcVATax(vaIncome,S.filingStatus).tax : vaIncome*sr;
  }
  // Always compute VA for form rendering
  const vaPassIncome = Math.max(0,net-deductSE-qbiDed);
  const va = S.entityType==='ccorp'
    ? {taxable:net, tax:Math.max(0,net*.06), stdDed:0, exemption:0}
    : calcVATax(vaPassIncome, S.filingStatus);
  return {gross,cogs,exp,net,seTax,deductSE,qbiDed,fedTax,stateTax,total:seTax+fedTax+stateTax, vaPassIncome, va};
}

/* ─── UTILS ─── */
const $  = n => '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const $n = n => '('+$(n)+')';
// Format for official form dollar boxes (no $ sign, 2 decimals, blank if zero)
const fl = n => (!n||n===0) ? '' : Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fla= n => Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); // always show

function refreshSB() {
  const t=calc();
  document.getElementById('sbRev').textContent=$(t.gross);
  document.getElementById('sbCOGS').textContent=$n(t.cogs);
  document.getElementById('sbExp').textContent=$n(t.exp);
  document.getElementById('sbProfit').textContent=$(t.net);
  document.getElementById('sbSE').textContent=$(t.seTax);
  document.getElementById('sbFed').textContent=$(t.fedTax);
  document.getElementById('sbSt').textContent=$(t.stateTax);
  document.getElementById('sbTot').textContent=$(t.total);
  document.getElementById('hdrAmt').textContent=$(t.total);
}
function refreshProg() {
  const pct=Math.round((cur/(SCREENS.length-1))*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progLbl').textContent=SLABELS[cur];
}
function collect() {
  document.querySelectorAll('#mc input,#mc select').forEach(el=>{
    if (!el.name||!(el.name in S)) return;
    if (el.type==='radio') { if(el.checked) S[el.name]=el.value; }
    else if (el.type==='checkbox') S[el.name]=el.checked;
    else if (el.type==='number') S[el.name]=parseFloat(el.value)||0;
    else S[el.name]=el.value;
  });
  refreshSB();
}
function go(d) {
  collect();
  let n=cur+d;
  if (SCREENS[n]==='personal'&&S.entityType==='ccorp') n+=d;
  cur=Math.max(0,Math.min(SCREENS.length-1,n));
  render(); window.scrollTo({top:0,behavior:'smooth'});
}
function mf(id,label,hint,key) {
  return `<div class="fg"><div class="fl">${label}${hint?` <span class="hint">${hint}</span>`:''}</div>
  <div class="dw"><input type="number" id="${id}" name="${key}" value="${S[key]||''}" min="0" placeholder="0" oninput="S['${key}']=parseFloat(this.value)||0;refreshSB()"></div></div>`;
}

  ${mf('bi','Beginning Inventory','value on January 1','beginningInventory')}
  ${mf('pu','Purchases','materials &amp; merchandise bought this year','purchases')}
  ${mf('ei','Ending Inventory','value on December 31','endingInventory')}
  <div class="btn-row"><button class="btn-back" onclick="go(-1)">← Back</button><button class="btn-cont" onclick="go(1)">Continue →</button></div>
</div>`; }

function sExpenses() {
  const flds=[
    ['advertising','Advertising','Ads, promotions, social media'],
    ['carExpenses','Car &amp; Truck Expenses','Actual costs or standard mileage (67¢/mi for 2025)'],
    ['depreciation','Depreciation','From Form 4562 (excludes §179 — enter that in Deductions)'],
    ['employeeBenefits','Employee Benefit Programs','Health insurance, retirement, fringe benefits'],
    ['insurance','Insurance (not health)','Business, liability, property insurance'],
    ['legalProfessional','Legal &amp; Professional Services','Attorneys, CPAs, consultants'],
    ['officeExpense','Office Expenses','Supplies, postage, small equipment'],
    ['rentEquipment','Rent / Lease — Equipment','Machinery, computers, vehicles you lease'],
    ['rentSpace','Rent / Lease — Space','Office, warehouse, or retail space rent'],
    ['repairsMaintenance','Repairs &amp; Maintenance','Routine upkeep of business property'],
    ['supplies','Supplies','Business supplies not counted in COGS'],
    ['taxesLicenses','Taxes &amp; Licenses','Business licenses, payroll taxes, local fees'],
    ['travel','Business Travel','100% deductible — airfare, hotel, rental car'],
    ['meals','Meals','50% deductible — enter the full amount paid'],
    ['utilities','Utilities','Electricity, internet, phone for business'],
    ['wages','Wages &amp; Salaries','Employee wages (not owner draws)'],
    ['otherExpenses','Other Expenses','Ordinary &amp; necessary expenses not listed above'],
  ];
  return `<div class="card">
  <span class="step-chip">Step 6 of 8</span>
  <h1>Business Expenses</h1>
  <p class="sub">These populate Schedule C Part II (Lines 8–27) or the Deductions section of your entity form.</p>
  ${flds.map(([k,l,h])=>mf(k,l,h,k)).join('')}
  <div class="btn-row"><button class="btn-back" onclick="go(-1)">← Back</button><button class="btn-cont" onclick="go(1)">Continue →</button></div>
</div>`; }

function sDeductions() {
  const showQBI = S.entityType !== 'ccorp';
  return `<div class="card">
  <span class="step-chip">Step 7 of 8</span>
  <h1>Deductions</h1>
  <p class="sub">These deductions reduce taxable income before calculating what you owe.</p>
  <div class="sh">Section 179 — Immediate Expensing</div>
  ${mf('s179','Section 179 Deduction','max $1,220,000 for 2025 — equipment, software, vehicles','section179')}
  ${showQBI?`<hr class="sd"><div class="sh">Qualified Business Income Deduction (§199A)</div>
  <div class="alert info">Eligible pass-through businesses may deduct up to 20% of net qualified business income. Income phase-outs apply for high earners.</div>
  <div class="rg">
    <label class="rc ${S.qbi?'sel':''}" onclick="pickQBI(true,this)"><input type="radio" name="qbi" value="true" ${S.qbi?'checked':''}>
      <div class="rc-body"><div class="t">Claim QBI Deduction (20% of net profit)</div><div class="d">Reduces taxable income. Simplified §199A calculation applied.</div></div></label>
    <label class="rc ${!S.qbi?'sel':''}" onclick="pickQBI(false,this)"><input type="radio" name="qbi" value="false" ${!S.qbi?'checked':''}>
      <div class="rc-body"><div class="t">Skip QBI Deduction</div><div class="d">Your business may not qualify (specified service trade, income over threshold).</div></div></label>
  </div>`:''}
  <div class="btn-row"><button class="btn-back" onclick="go(-1)">← Back</button><button class="btn-cont" onclick="go(1)">Continue →</button></div>
</div>`; }

function sReview() {
  const t=calc();
  const en={sole_prop:'Sole Proprietor',llc:'Partnership / LLC',scorp:'S Corporation',ccorp:'C Corporation'};
  const fn={single:'Single',mfj:'Married Filing Jointly',mfs:'Married Filing Separately',hoh:'Head of Household'};
  const fm={sole_prop:'Schedule C + Form 1040  ·  VA Form 760',llc:'Form 1065  ·  VA Form 502',scorp:'Form 1120-S  ·  VA Form 502',ccorp:'Form 1120  ·  VA Form 500'};
  return `<div class="card">
  <span class="step-chip">Step 8 of 8</span>
  <h1>Review Your Return</h1>
  <p class="sub">Confirm everything before generating your official-format tax forms.</p>
  <div class="sh">Business</div>
  <div class="rb">
    <div class="rl"><span>Entity Type</span><strong>${en[S.entityType]}</strong></div>
    <div class="rl"><span>Forms Generated</span><strong>${fm[S.entityType]}</strong></div>
    <div class="rl"><span>Business Name</span><strong>${S.businessName||'—'}</strong></div>
    <div class="rl"><span>EIN / SSN</span><strong>${S.ein||'—'}</strong></div>
    <div class="rl"><span>Address</span><strong>${[S.businessAddress,S.businessCity,S.businessState,S.businessZip].filter(Boolean).join(', ')||'—'}</strong></div>
    ${S.entityType!=='ccorp'?`<div class="rl"><span>Owner</span><strong>${S.ownerName||'—'} · ${fn[S.filingStatus]}</strong></div>`:''}
  </div>
  <div class="sh">Income Summary</div>
  <div class="rb">
    <div class="rl"><span>Gross Revenue</span><strong>${$(t.gross)}</strong></div>
    <div class="rl"><span>Cost of Goods Sold</span><strong>${$n(t.cogs)}</strong></div>
    <div class="rl"><span>Business Expenses</span><strong>${$n(t.exp)}</strong></div>
    <div class="rl bold"><span>Net Profit</span><strong>${$(t.net)}</strong></div>
  </div>
  <div class="sh">Tax Due</div>
  <div class="rb">
    ${t.seTax>0?`<div class="rl"><span>Self-Employment Tax</span><strong>${$(t.seTax)}</strong></div>`:''}
    ${t.qbiDed>0?`<div class="rl"><span>QBI Deduction (20%)</span><strong>${$n(t.qbiDed)}</strong></div>`:''}
    <div class="rl"><span>Federal Income Tax</span><strong>${$(t.fedTax)}</strong></div>
    <div class="rl"><span>Virginia Tax</span><strong>${$(t.va.tax)}</strong></div>
    <div class="rl bold" style="color:var(--blue)"><span>Total Estimated Tax</span><strong>${$(t.total)}</strong></div>
  </div>
  <div class="btn-row"><button class="btn-back" onclick="go(-1)">← Back</button><button class="btn-cont" onclick="go(1)">Generate Official Tax Return →</button></div>
</div>`; }

/* ─── TAX RETURN SCREEN ─── */
function sTaxReturn() {
  const t = calc();
  const fm={sole_prop:'Schedule C (Form 1040)',llc:'Form 1065',scorp:'Form 1120-S',ccorp:'Form 1120'};
  const va={sole_prop:'Virginia Form 760',llc:'Virginia Form 502',scorp:'Virginia Form 502',ccorp:'Virginia Form 500'};
  return `<div class="card">
  <div style="text-align:center;margin-bottom:20px">
    <h1 style="font-size:22px">Official Tax Forms Ready</h1>
    <p class="sub" style="margin-bottom:0">Use the tabs to review each form. Click <strong>Print Both Forms</strong> to generate a PDF with both the federal and Virginia returns.</p>
  </div>
  <div class="abar">
    <button class="btn-print" onclick="window.print()">🖨&nbsp; Print Both Forms / Save PDF</button>
    <button class="btn-dl" onclick="dlSummary()">⬇&nbsp; Download .txt Summary</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn on"  id="tbFed" onclick="showTab('fed',this)">📋 Federal — ${fm[S.entityType]||'Schedule C'}</button>
    <button class="tab-btn"     id="tbVa"  onclick="showTab('va',this)" >🏛 Virginia — ${va[S.entityType]||'Form 760'}</button>
  </div>

  <div class="tab-content" id="tab-fed">
    <p style="font-size:11px;color:#6B7280;margin-bottom:14px">⚠ This is an officially-formatted planning document. Verify all figures with a CPA before submitting to the IRS.</p>
    ${renderFederalForm(t)}
  </div>
  <div class="tab-content" id="tab-va" style="display:none">
    <p style="font-size:11px;color:#6B7280;margin-bottom:14px">⚠ Virginia tax calculated using ${S.taxYear} VA brackets (2%–5.75%). Verify with the Virginia Department of Taxation at <em>www.tax.virginia.gov</em>.</p>
    ${renderVirginiaForm(t)}
  </div>

  <div class="btn-row" style="margin-top:24px">
    <button class="btn-back" onclick="go(-1)">← Edit Return</button>
    <button class="btn-cont" onclick="window.print()">🖨 Print / Save PDF</button>
  </div>
</div>`;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+tab).style.display='block';
  btn.classList.add('on');
}

/* ─── PICKERS ─── */
function pickE(v,el) { S.entityType=v; el.closest('.rg').querySelectorAll('.rc').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); el.querySelector('input').checked=true; refreshSB(); }
function pickF(v,el) { S.filingStatus=v; el.closest('.rg').querySelectorAll('.rc').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); el.querySelector('input').checked=true; refreshSB(); }
function pickQBI(v,el) { S.qbi=v; el.closest('.rg').querySelectorAll('.rc').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); el.querySelector('input').checked=true; refreshSB(); }

/* ─── DOWNLOAD ─── */
function dlSummary() {
  const t=calc();
  const en={sole_prop:'Sole Proprietor',llc:'Partnership/LLC',scorp:'S Corporation',ccorp:'C Corporation'};
  const fn={single:'Single',mfj:'Married Filing Jointly',mfs:'Married Filing Separately',hoh:'Head of Household'};
  const txt=`TAXFLOW PRO — BUSINESS TAX SUMMARY
Tax Year: ${S.taxYear}   Generated: ${new Date().toLocaleDateString()}
======================================================
BUSINESS INFORMATION
Entity Type:              ${en[S.entityType]}
Business Name:            ${S.businessName||'N/A'}
EIN / SSN:                ${S.ein||'N/A'}
Address:                  ${[S.businessAddress,S.businessCity,S.businessState,S.businessZip].filter(Boolean).join(', ')||'N/A'}
${S.entityType!=='ccorp'?`Owner:                    ${S.ownerName||'N/A'}
Filing Status:            ${fn[S.filingStatus]}`:''}

INCOME SUMMARY
Gross Revenue:            ${$(t.gross)}
Cost of Goods Sold:      (${$(t.cogs)})
Business Expenses:       (${$(t.exp)})
                          ──────────────────
Net Profit:               ${$(t.net)}

TAX CALCULATION
Self-Employment Tax:      ${$(t.seTax)}
1/2 SE Tax Deduction:    (${$(t.deductSE)})
QBI Deduction (20%):     (${$(t.qbiDed)})
Federal Income Tax:       ${$(t.fedTax)}
Virginia Tax:             ${$(t.va.tax)}
                          ──────────────────
TOTAL TAX OWED:           ${$(t.total)}
Effective Rate:           ${t.net>0?((t.total/t.net)*100).toFixed(1):'0.0'}%
Quarterly Payment Est:    ${$(t.total/4)}

EXPENSE DETAILS
Advertising:              ${$(S.advertising)}
Car & Truck:              ${$(S.carExpenses)}
Depreciation:             ${$(S.depreciation)}
Section 179:              ${$(S.section179)}
Employee Benefits:        ${$(S.employeeBenefits)}
Insurance:                ${$(S.insurance)}
Legal & Professional:     ${$(S.legalProfessional)}
Office Expense:           ${$(S.officeExpense)}
Rent - Equipment:         ${$(S.rentEquipment)}
Rent - Space:             ${$(S.rentSpace)}
Repairs & Maintenance:    ${$(S.repairsMaintenance)}
Supplies:                 ${$(S.supplies)}
Taxes & Licenses:         ${$(S.taxesLicenses)}
Travel:                   ${$(S.travel)}
Meals (50%):              ${$((S.meals||0)*.5)}
Utilities:                ${$(S.utilities)}
Wages & Salaries:         ${$(S.wages)}
Other Expenses:           ${$(S.otherExpenses)}

DISCLAIMER
This summary is for planning purposes only. These are not official IRS or Virginia
tax forms. Consult a licensed CPA or enrolled agent before filing.
`;
  const b=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`TaxSummary_${(S.businessName||'Business').replace(/\s+/g,'_')}_${S.taxYear}.txt`;
  a.click(); URL.revokeObjectURL(a.href);
}

/* ─── RENDER ─── */
function render() {
  const map={welcome:sWelcome,entity:sEntity,bizinfo:sBizInfo,personal:sPersonal,revenue:sRevenue,cogs:sCOGS,expenses:sExpenses,deductions:sDeductions,review:sReview,taxreturn:sTaxReturn};
  document.getElementById('mc').innerHTML=(map[SCREENS[cur]]||sWelcome)();
  refreshProg(); refreshSB();
}
render();
</script>
</body>
</html>
